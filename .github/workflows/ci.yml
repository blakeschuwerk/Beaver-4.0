name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test Node functions
        run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper deps
        run: |
          pip install -r functions/scraper/requirements.txt
          pip install pytest

      - name: Test scraper
        working-directory: functions/scraper
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -q

      - name: Install analyzer deps
        run: pip install -r functions/analyzer/requirements.txt

      - name: Test analyzer
        working-directory: functions/analyzer
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -q

      - name: Compile Python sources
        run: |
          python -m compileall functions/scraper/src functions/analyzer/src
