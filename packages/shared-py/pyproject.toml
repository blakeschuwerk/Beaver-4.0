[project]
name = "beaver-shared"
version = "0.1.0"
description = "Python pydantic mirrors for Beaver 4.0 shared contracts"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "jsonschema>=4.23.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[build-system]
requires = ["setuptools>=75.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
